# ==========================
# CONFIGURAÇÕES DA APLICAÇÃO
# ==========================
spring.application.name=fluxo-estoque
server.port=8081

# Habilita Virtual Threads (Java 21)
spring.threads.virtual.enabled=true

# ==========================
# CONFIGURAÇÕES DO BANCO (POSTGRES)
# ==========================
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================
# CONFIGURAÇÕES DO KAFKA (CONSUMER)
# ==========================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=estoque-group
spring.kafka.consumer.auto-offset-reset=earliest

# Deserialização de JSON
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# Configuração do Delegado (JsonDeserializer)
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# Segurança e Tipagem (Crucial para evitar o erro de Header/No Type)
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.fluxo_estoque.domain.event.OrderEvent

# ==========================
# LOGGING
# ==========================
logging.level.org.springframework.kafka=INFO
logging.level.org.hibernate.SQL=DEBUG